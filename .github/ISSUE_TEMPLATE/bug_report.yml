name: "Bug report"
description: "Report a reproducible defect in @execlave/sdk"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Security issues: please email security@execlave.com instead.
  - type: input
    id: sdk-version
    attributes:
      label: "@execlave/sdk version"
      description: "Output of `npm ls @execlave/sdk`"
      placeholder: "1.1.0"
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: "Node.js version"
      placeholder: "20.11.0"
    validations:
      required: true
  - type: input
    id: runtime
    attributes:
      label: "Runtime / framework"
      placeholder: "e.g. Next.js 15, Express 4, Hono 4, Cloudflare Workers, Bun 1.1"
    validations:
      required: true
  - type: dropdown
    id: integration
    attributes:
      label: "Integration in use (if any)"
      options:
        - "None (core SDK only)"
        - "LangChain (ExeclaveCallbackHandler)"
        - "OpenTelemetry"
        - "Other"
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: "Minimal reproduction"
      description: "The smallest TypeScript/JavaScript sample that reproduces the issue. Redact API keys."
      render: typescript
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "Expected behaviour"
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: "Actual behaviour"
      description: "Include stack traces if any."
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: "Additional context"
